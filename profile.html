<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông Tin Cá Nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <ul class="nav nav-pills mb-4 pb-3 border-bottom">
        <li class="nav-item"><a class="nav-link" href="/">Trang chủ</a></li>
        <li class="nav-item"><a class="nav-link" href="/register-account">Tài khoản</a></li>
        <li class="nav-item"><a class="nav-link" href="/register-service">Dịch vụ</a></li>
        <li class="nav-item"><a class="nav-link active" href="/profile">Cá nhân</a></li>
    </ul>

    <div class="row">
        <div class="col-md-7 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Hồ Sơ Cá Nhân</h5>
                </div>
                <div class="card-body">
                    <form id="proForm" action="/submit-profile" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label">Họ và tên (Chỉ chữ):</label>
                            <input type="text" id="fullname" name="fullname" class="form-control" required oninput="updatePreview()">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại (10 số):</label>
                            <input type="text" id="phone" name="phone" class="form-control" maxlength="10" required oninput="updatePreview()">
                            <div id="phone-error" class="form-text text-danger" style="display:none;">Số điện thoại phải đủ 10 số!</div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Giới tính:</label>
                            <select id="gender" name="gender" class="form-select" onchange="updatePreview()">
                                <option value="Nam">Nam</option>
                                <option value="Nữ">Nữ</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Địa chỉ (Tối đa 100 ký tự):</label>
                            <textarea id="address" name="address" class="form-control" rows="3" maxlength="100" oninput="countChar()"></textarea>
                            <div class="form-text">Còn lại: <span id="charCount" class="fw-bold">100</span> ký tự.</div>
                        </div>
                        
                        <button type="submit" class="btn btn-dark w-100">Cập Nhật Thông Tin</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card border-primary mb-3 sticky-top" style="top: 20px;">
                <div class="card-header bg-transparent border-primary text-primary fw-bold">
                    Thẻ Xem Trước
                </div>
                <div class="card-body">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item"><strong>Tên:</strong> <span id="prev-name" class="text-muted">...</span></li>
                        <li class="list-group-item"><strong>SĐT:</strong> <span id="prev-phone" class="text-muted">...</span></li>
                        <li class="list-group-item"><strong>Giới tính:</strong> <span id="prev-gender" class="text-muted">Nam</span></li>
                        <li class="list-group-item"><strong>Địa chỉ:</strong> <span id="prev-address" class="text-muted">...</span></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('fullname').addEventListener('input', function() { 
        this.value = this.value.replace(/[^a-zA-ZÀ-ỹ\s]/g, ''); 
    });
    document.getElementById('phone').addEventListener('input', function() { 
        this.value = this.value.replace(/[^0-9]/g, ''); 
    });

    function countChar() {
        const addr = document.getElementById('address');
        document.getElementById('charCount').innerText = 100 - addr.value.length;
        updatePreview();
    }

    function updatePreview() {
        document.getElementById('prev-name').innerText = document.getElementById('fullname').value || "...";
        document.getElementById('prev-phone').innerText = document.getElementById('phone').value || "...";
        document.getElementById('prev-gender').innerText = document.getElementById('gender').value;
        document.getElementById('prev-address').innerText = document.getElementById('address').value || "...";
    }

    document.getElementById('proForm').addEventListener('submit', function(e) {
        if (document.getElementById('phone').value.length !== 10) {
            e.preventDefault(); document.getElementById('phone-error').style.display = 'block';
        }
    });
</script>
</body>
</html>
