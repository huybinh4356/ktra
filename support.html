<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gửi Yêu Cầu Hỗ Trợ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <ul class="nav nav-pills mb-4 pb-3 border-bottom">
        <li class="nav-item"><a class="nav-link active" href="/support">Hỗ trợ</a></li>
        <li class="nav-item"><a class="nav-link" href="/register-account">Tài khoản</a></li>
        <li class="nav-item"><a class="nav-link" href="/register-service">Dịch vụ</a></li>
        <li class="nav-item"><a class="nav-link" href="/profile">Cá nhân</a></li>
    </ul>

    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm border-warning">
                <div class="card-header bg-warning text-dark fw-bold">
                    <h5 class="mb-0">Gửi Yêu Cầu Hỗ Trợ Kỹ Thuật</h5>
                </div>
                <div class="card-body">
                    <form id="supportForm" action="/submit-support" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label">Chủ đề cần hỗ trợ:</label>
                            <select name="topic" class="form-select" required>
                                <option value="" selected disabled>-- Lựa chọn vấn đề --</option>
                                <option value="tech">Lỗi kỹ thuật / Hệ thống</option>
                                <option value="billing">Thanh toán / Cước phí</option>
                                <option value="other">Tư vấn dịch vụ khác</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại liên hệ (10 số):</label>
                            <input type="text" id="phone" name="phone" class="form-control" maxlength="10" required>
                            <div id="phone-error" class="form-text text-danger" style="display:none;">Vui lòng nhập đúng 10 số.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả chi tiết vấn đề:</label>
                            <textarea id="message" name="message" class="form-control" rows="4" maxlength="250" required oninput="validateMessage()"></textarea>
                            <div class="d-flex justify-content-between form-text">
                                <span id="msg-warning" class="text-danger">Cần nhập ít nhất 10 ký tự.</span>
                                <span>Còn lại: <strong id="charCount">250</strong> ký tự</span>
                            </div>
                        </div>
                        
                        <button type="submit" id="btnSubmit" class="btn btn-warning w-100 fw-bold" disabled>Gửi Yêu Cầu</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('phone').addEventListener('input', function() { 
        this.value = this.value.replace(/[^0-9]/g, ''); 
    });

    function validateMessage() {
        const msgInput = document.getElementById('message');
        const currentLength = msgInput.value.length;
        const btnSubmit = document.getElementById('btnSubmit');
        const warning = document.getElementById('msg-warning');
        
        document.getElementById('charCount').innerText = 250 - currentLength;

        if (currentLength >= 10) {
            btnSubmit.disabled = false;
            warning.style.display = 'none';
        } else {
            btnSubmit.disabled = true;
            warning.style.display = 'block';
        }
    }

    document.getElementById('supportForm').addEventListener('submit', function(e) {
        if (document.getElementById('phone').value.length !== 10) {
            e.preventDefault(); 
            document.getElementById('phone-error').style.display = 'block';
        }
    });
</script>
</body>
</html>
